<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indovina il Personaggio</title>
    <style>
        body {
            font-family: AZ Grampa;
            margin-top: 15%;
            padding: 50px;
            color: rgb(19, 99, 86);
            background-color: #e7e7e7;
            background-image: url(img/Senza\ titolo-22.png);
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
        }
        @font-face {
            font-family: "AZ Grampa";
            src: url(/assets/font/AZ\ Grampa.TTF);
        }
        .hidden {
            display: none;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            font-family: AZ Grampa;
            border: 2px solid rgb(19, 99, 86);
            border-radius: 0.7em;
            color: rgb(19, 99, 86);
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }
        button:hover {
            background-color: rgb(19, 99, 86);
            color: #e7e7e7;
        }
        .character-image {
           
            max-width: 400px;
            max-height: 400px;
            border-radius: 10px;
            display: none;
            transition: all 2s ease-in-out;
        }
        
    </style>
    
</head>
<body>
    <h1>Indovina il Personaggio</h1>
    <div id="question-section">
        <p id="question"></p>
        <button onclick="answer('yes')">Sì</button>
        <button onclick="answer('no')">No</button>
    </div>
    <div id="guess-section" class="hidden">
        <p id="guess"></p>
        <button onclick="guessAnswer('correct')">Corretto</button>
        <button onclick="guessAnswer('wrong')">Sbagliato</button>
    </div>
    <div id="result-section" class="hidden">
        <p id="result"></p>
        <button onclick="restart()">Gioca di nuovo</button>
    </div>
    <div id="background-blur" class="background-blur"></div>
    <img id="character-image" class="character-image" src="" alt="Immagine del personaggio">

    <script>
        const characters = [
      { name: 'Albert Einstein', traits: ['uomo', 'scienziato', 'fisico', 'tedesco'], img: 'assets/img/Albert_Einstein_Head.jpg' },
  { name: 'Marie Curie', traits: ['donna', 'scienziato', 'chimica', 'francese', 'polacca'], img: 'https://www.enciclopediadelledonne.it/edd.nsf/0/53BEFBE08A59DA94C1258A0500546E09/$file/Maria_Sklodowska-Curie_1903.jpg' },
  { name: 'Charles Darwin', traits: ['uomo', 'scienziato', 'biologo', 'britannico'], img: 'https://www.meisterdrucke.it/kunstwerke/1260px/John%20Collier%20-%20Portrait%20of%20Charles%20Darwin%20%281809-1882%29%201883%20%20-%20%28MeisterDrucke-257429%29.jpg' },
  { name: 'Jane Goodall', traits: ['vivo', 'donna', 'scienziata', 'primatologa', 'britannico'], img: 'https://cdn.theatlantic.com/thumbor/vNBY-iy63ZifZS63bm75b2aiJL8=/0x0:1200x1500/648x810/media/img/2025/10/02/2025_10_02_Jane_Goodall_Lede/original.jpg' },
  { name: 'Alan Turing', traits: ['uomo', 'scienziato', 'matematico', 'britannico'], img: 'https://www.canottaggio.org/wp-content/uploads/2021/12/Alan_Turing_1.jpg' },
  { name: 'Carl Friedrich Gauss', traits: ['uomo', 'scienziato', 'matematico', 'tedesco'], img: 'https://www.meisterdrucke.it/kunstwerke/1260px/Christian%20Albrecht%20Jensen%20-%20Portrait%20of%20Carl%20Friedrich%20Gauss%201840%20%20-%20%28MeisterDrucke-175614%29.jpg' },
  { name: 'Srinivasa Ramanujan', traits: ['uomo', 'scienziato', 'matematico', 'indiano'], img: 'https://upload.wikimedia.org/wikipedia/commons/b/bf/Srinivasa_Ramanujan-Add._MS_a94_version2.jpg' },
  { name: 'Tim Berners-Lee', traits: ['vivo', 'uomo', 'scienziato', 'informatico', 'britannico'], img: 'https://cdn.britannica.com/94/123894-050-53EC378E/Tim-Berners-Lee-2005.jpg' },
  { name: 'Nikola Tesla', traits: ['uomo', 'scienziato', 'inventore', 'serbo', 'americano'], img: 'https://www.copia-di-arte.com/kunst/unbekannter_kuenstler/nikola-tesla-serb-us--physicist.jpg' },
  { name: 'Hedy Lamarr', traits: ['donna', 'inventore', 'attrice', 'austriaca'], img: 'https://upload.wikimedia.org/wikipedia/commons/6/61/Hedy_lamarr_-_1940.jpg' },
  { name: 'Steve Jobs', traits: ['uomo', 'imprenditore', 'americano'], img: 'https://media-assets.wired.it/photos/6960c06fa329b26b13cb27d9/1:1/w_1668,h_1668,c_limit/Early-Steve-Jobs-Paraphernalia-Goes-Up-for-Auction-Business-80147355.jpg' },
  { name: 'Elon Musk', traits: ['uomo', 'vivo', 'imprenditore', 'sudafricano', 'americano'], img: 'https://m.wsj.net/video/20180907/090718muskpot1/090718muskpot1_1920x1080.jpg' },
  { name: 'Guglielmo Marconi', traits: ['uomo', 'inventore', 'ingegnere', 'italiano'], img: 'https://scienzapertutti.infn.it/images/stories/scienziati/guglielmo-marconi-1874-1937-640.jpg' },
  { name: 'Isambard Kingdom Brunel', traits: ['uomo', 'ingegnere', 'britannico'], img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRY1Bd_uaDyT-fjJMVwo92gmWpMcRdsPvNdE0ROWlSdNBOGW_xSpEWKx9Q&s=10' },
  { name: 'Emily Warren Roebling', traits: ['donna', 'ingegnere', 'americano'], img: 'https://upload.wikimedia.org/wikipedia/commons/8/80/Brooklyn_Museum_-_Portrait_of_Emily_Warren_Roebling_-_Charles-%C3%89mile-Auguste_Carolus-Duran.jpg' },
  { name: 'Dean Kamen', traits: ['uomo', 'Inventore', 'vivo', 'ingegnere', 'americano'], img: 'https://upload.wikimedia.org/wikipedia/commons/8/82/Dean_Kamen_visits_Team_Whiteman_160426-F-TQ704-039_%28cropped%29.jpg' },
  { name: 'Leonardo da Vinci', traits: ['uomo', 'artista', 'inventore', 'ingegnere', 'italiano'], img: 'https://cdn.britannica.com/57/194757-050-FD0A1CAA/Portrait-Leonardo-da-Vinci.jpg' },
  { name: 'Pablo Picasso', traits: ['uomo', 'artista', 'spagnolo'], img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTvjBNduSPcUWBR633LwxWKaKGwV2VFZMvb44ZfO842NEjsTc12thbQlVQW&s=10' },
  { name: 'Frida Kahlo', traits: ['donna', 'artista', 'messicana'], img: 'https://www.civita.art/wp-content/uploads/2022/02/Immagine-guida-1.jpg' },
  { name: 'Vincent van Gogh', traits: ['uomo', 'artista', 'olandese'], img: 'https://upload.wikimedia.org/wikipedia/commons/3/38/VanGogh_1887_Selbstbildnis.jpg' },
  { name: 'Michelangelo Buonarroti', traits: ['uomo', 'artista', 'scultore', 'italiano'], img: 'https://cdn.britannica.com/46/75046-050-0973B0E8/Michelangelo.jpg' },
  { name: 'Richard Wagner', traits: ['uomo', 'compositore', 'tedesco'], img: 'https://www.bayreuth-tourismus.de/wp-content/uploads/2021/07/N3250_RW-Hanfstaengl1871_grey.jpg' },
  { name: 'Claude Debussy', traits: ['uomo', 'compositore', 'francese'], img: 'https://upload.wikimedia.org/wikipedia/commons/f/f9/Claude_Debussy_ca_1908%2C_foto_av_F%C3%A9lix_Nadar.jpg' },
  { name: 'Emmy Noether', traits: ['donna', 'matematico', 'tedesco'], img: 'https://oggiscienza.it/wp-content/uploads/2018/03/noether_petite_image.png' },
  { name: 'Ada Lovelace', traits: ['donna', 'matematico', 'britannico'], img: 'https://image.geo.de/30155520/t/BP/v3/w1440/r0/-/ada-lovelace-1223991995-jpg--88778-.jpg' }
        ];
        const questions = [
    { text: 'Il personaggio è un uomo?', traits: ['uomo'] },
    { text: 'Il personaggio è una donna?', traits: ['donna'] },
	{ text: 'Il personaggio è ancora in vita?', traits: ['vivo'] },
    { text: 'Il personaggio è uno scienziato?', traits: ['scienziato'] },
    { text: 'Il personaggio è un artista?', traits: ['artista'] },
	{ text: 'Il personaggio è noto per le sue sculture?', traits: ['scultore'] },
	{ text: 'Il personaggio è un compositore?', traits: ['compositore'] },
    { text: 'Il personaggio è un imprenditore?', traits: ['imprenditore'] },
    { text: 'Il personaggio è britannico?', traits: ['britannico'] },
    { text: 'Il personaggio è americano?', traits: ['americano'] },
    { text: 'Il personaggio è tedesco?', traits: ['tedesco'] },
    { text: 'Il personaggio è italiano?', traits: ['italiano'] },
    { text: 'Il personaggio è francese?', traits: ['francese'] },
    { text: 'Il personaggio è polacco?', traits: ['polacca'] },
    { text: 'Il personaggio è messicano?', traits: ['messicana'] },
    { text: 'Il personaggio è spagnolo?', traits: ['spagnolo'] },
    { text: 'Il personaggio è indiano?', traits: ['indiano'] },
    { text: 'Il personaggio è sudafricano?', traits: ['sudafricano'] },
    { text: 'Il personaggio è serbo?', traits: ['serbo'] },
    { text: 'Il personaggio è austriaco?', traits: ['austriaca'] },
    { text: 'Il personaggio è un inventore?', traits: ['inventore'] },
    { text: 'Il personaggio è un fisico?', traits: ['fisico'] },
    { text: 'Il personaggio è un chimico?', traits: ['chimica'] },
    { text: 'Il personaggio è un biologo?', traits: ['biologo'] },
    { text: 'Il personaggio è un primatologo?', traits: ['primatologa'] },
    { text: 'Il personaggio è un matematico?', traits: ['matematico'] },
    { text: 'Il personaggio è un ingegnere?', traits: ['ingegnere'] },
    { text: 'Il personaggio è un informatico?', traits: ['informatico'] },


];


        let currentQuestionIndex = 0;
        let possibleCharacters = characters.slice();
        let askedQuestions = [];

        function calculateTraitFrequencies() {
            const traitFrequencies = {};

            for (const character of possibleCharacters) {
                for (const trait of character.traits) {
                    if (!traitFrequencies[trait]) {
                        traitFrequencies[trait] = 0;
                    }
                    traitFrequencies[trait]++;
                }
            }

            return traitFrequencies;
        }

        function askQuestion() {
            if (possibleCharacters.length <= 1) {
                makeGuess();
                return;
            }

            const traitFrequencies = calculateTraitFrequencies();
            
            // Ordina le domande in base alla frequenza dei tratti
            let sortedQuestions = questions
                .filter((question, index) => !askedQuestions.includes(index))
                .sort((a, b) => {
                    const aFrequency = a.traits.reduce((sum, trait) => sum + (traitFrequencies[trait] || 0), 0);
                    const bFrequency = b.traits.reduce((sum, trait) => sum + (traitFrequencies[trait] || 0), 0);
                    return bFrequency - aFrequency;
                });

            if (sortedQuestions.length > 0) {
                const selectedQuestion = sortedQuestions[0];
                askedQuestions.push(questions.indexOf(selectedQuestion));
                document.getElementById('question').innerText = selectedQuestion.text;
            } else {
                makeGuess();
            }
        }

        function answer(response) {
            const currentQuestion = questions[askedQuestions[currentQuestionIndex]];
            currentQuestionIndex++;

            possibleCharacters = possibleCharacters.filter(character => {
                const hasTrait = currentQuestion.traits.some(trait => character.traits.includes(trait));
                return (response === 'yes' && hasTrait) || (response === 'no' && !hasTrait);
            });

            if (possibleCharacters.length === 0) {
                document.getElementById('question-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');
                document.getElementById('result').innerText = 'Questo personaggio non esiste.';
            } else {
                askQuestion();
            }
        }

        function makeGuess() {
            const characterImage = document.getElementById('character-image');
            if (possibleCharacters.length === 1) {
                const guessedCharacter = possibleCharacters[0];
                document.getElementById('guess').innerText = `È ${guessedCharacter.name}?`;
                characterImage.src = guessedCharacter.img;
                characterImage.style.display = 'block';
                document.getElementById('question-section').classList.add('hidden');
                document.getElementById('guess-section').classList.remove('hidden');
            } else if (possibleCharacters.length === 0) {
                document.getElementById('guess').innerText = 'Questo personaggio non esiste.';
                characterImage.style.display = 'none';
                document.getElementById('question-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');
            } else {
                document.getElementById('guess').innerText = 'Non sono riuscito a indovinare. Vuoi riprovare?';
                characterImage.style.display = 'none';
                document.getElementById('question-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');
            }
        }

        function guessAnswer(response) {
            if (response === 'correct') {
                document.getElementById('result').innerText = 'VITTORIA!';
            } else {
                document.getElementById('result').innerText = 'Sbagliato! Prova di nuovo.';
            }
            document.getElementById('guess-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
        }

        function restart() {
            currentQuestionIndex = 0;
            possibleCharacters = characters.slice();
            askedQuestions = [];
            document.getElementById('question-section').classList.remove('hidden');
            document.getElementById('guess-section').classList.add('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('character-image').style.display = 'none';
            askQuestion();
        }

        document.addEventListener('DOMContentLoaded', (event) => {
            askQuestion();
        });
    </script>
</body>
</html>
